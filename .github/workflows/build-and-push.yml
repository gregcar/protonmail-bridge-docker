name: Build and Push arm64 image

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get upstream Proton Bridge version
        id: version
        run: |
          VERSION=$(curl -s https://api.github.com/repos/ProtonMail/proton-bridge/releases/latest \
            | jq -r .tag_name)
          echo "tag=$VERSION" >> $GITHUB_OUTPUT
          echo "Upstream version: $VERSION"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if version already exists in GHCR
        id: check
        env:
          VERSION: ${{ steps.version.outputs.tag }}
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $TOKEN" \
            "https://ghcr.io/v2/$IMAGE_NAME/manifests/$VERSION")
          if [ "$STATUS" = "200" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Version $VERSION already built, skipping."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Version $VERSION is new, building."
          fi

      - name: Extract metadata (tags + labels)
        if: steps.check.outputs.exists == 'false' || github.event_name == 'push'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.tag }}
            type=sha,prefix=sha-

      - name: Build and push
        if: steps.check.outputs.exists == 'false' || github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}